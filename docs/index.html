<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parakeet ASR Euskaraz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --ink-950: #0a0615;
      --ink-900: #160b2b;
      --ink-800: #261247;
      --ink-700: #3a1b66;
      --violet-950: #1b0d2f;
      --violet-900: #251146;
      --violet-800: #34146b;
      --violet-700: #44208d;
      --violet-600: #5a2db2;
      --violet-500: #7c3aed;
      --violet-400: #9f67ff;
      --violet-300: #c0a6ff;
      --violet-200: #e4dbff;
      --blush-500: #f472b6;
      --white-5:  rgba(255,255,255,0.05);
      --white-10: rgba(255,255,255,0.10);
      --white-15: rgba(255,255,255,0.15);
      --white-40: rgba(255,255,255,0.40);
      --white-60: rgba(255,255,255,0.60);
      --white-70: rgba(255,255,255,0.70);
      --white-80: rgba(255,255,255,0.80);
      --white-90: rgba(255,255,255,0.90);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: "Manrope", system-ui, sans-serif;
      background-color: var(--ink-950);
      color: white;
      scrollbar-color: rgba(124,58,237,.6) rgba(16,8,34,.7);
    }

    body { min-height: 100vh; }

    h1, h2, h3 { font-family: "Space Grotesk", system-ui, sans-serif; }

    a { color: inherit; text-decoration: none; }

    /* Layout */
    .page-wrapper {
      position: relative;
      min-height: 100vh;
    }

    .hero-glow {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(circle at 85% 5%,  rgba(244,114,182,.2), transparent 50%),
        radial-gradient(circle at 30% 90%, rgba(99,102,241,.25), transparent 60%);
      opacity: .9;
    }

    .container {
      position: relative;
      max-width: 1152px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      padding: 3rem 1.5rem;
    }

    /* Glass card */
    .glass-card {
      border: 1px solid var(--white-10);
      background: var(--white-5);
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(10,6,21,.35);
    }

    /* Buttons */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border-radius: 9999px;
      background: var(--violet-500);
      padding: .75rem 1.5rem;
      font-size: .875rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      border: none;
      transition: background .15s;
      font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { background: var(--violet-400); }
    .btn-primary:disabled {
      cursor: not-allowed;
      background: rgba(124,58,237,.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border-radius: 9999px;
      border: 1px solid var(--white-15);
      background: var(--white-5);
      padding: .625rem 1.25rem;
      font-size: .875rem;
      font-weight: 600;
      color: var(--white-80);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      font-family: inherit;
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--violet-300); color: white; }
    .btn-secondary:disabled { cursor: not-allowed; color: var(--white-40); }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border-radius: 9999px;
      border: 1px solid rgba(239,68,68,.4);
      background: rgba(239,68,68,.1);
      padding: .625rem 1.25rem;
      font-size: .875rem;
      font-weight: 600;
      color: rgba(252,165,165,.8);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      font-family: inherit;
    }
    .btn-danger:hover:not(:disabled) { border-color: rgba(239,68,68,.7); color: #fca5a5; }
    .btn-danger:disabled { cursor: not-allowed; opacity: .5; }

    /* Language toggle */
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      border-radius: 9999px;
      border: 1px solid var(--white-15);
      background: var(--white-5);
      padding: .25rem;
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--white-70);
    }

    .lang-option {
      border-radius: 9999px;
      padding: .25rem .75rem;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--white-70);
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      transition: color .15s;
    }
    .lang-option:hover { color: white; }
    .lang-option.is-active {
      background: rgba(124,58,237,.25);
      color: white;
      box-shadow: 0 0 40px rgba(124,58,237,.35);
    }

    /* Tags / badges */
    .tag {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: .5rem;
      border-radius: 9999px;
      border: 1px solid var(--white-15);
      background: var(--white-5);
      padding: .5rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--white-70);
    }
    .tag-dot {
      display: inline-flex;
      height: .5rem;
      width: .5rem;
      border-radius: 9999px;
      background: var(--violet-400);
      box-shadow: 0 0 40px rgba(124,58,237,.35);
    }

    .badge-violet {
      border-radius: 9999px;
      border: 1px solid rgba(124,58,237,.4);
      background: rgba(124,58,237,.15);
      padding: .25rem 1rem;
      font-size: .875rem;
      color: var(--violet-200);
    }
    .badge-neutral {
      border-radius: 9999px;
      border: 1px solid var(--white-10);
      background: var(--white-5);
      padding: .25rem 1rem;
      font-size: .875rem;
      color: var(--white-70);
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .header-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .header-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .75rem;
    }
    .header-link {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      border-radius: 9999px;
      border: 1px solid var(--white-15);
      background: var(--white-5);
      padding: .5rem .75rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--white-70);
      transition: color .15s;
    }
    .header-link:hover { color: var(--violet-200); }
    .avatar {
      height: 2.5rem;
      width: 2.5rem;
      border-radius: 9999px;
      border: 1px solid var(--white-20, rgba(255,255,255,.2));
    }

    .header-title {
      font-size: clamp(2rem, 5vw, 3.75rem);
      font-weight: 600;
      color: white;
      line-height: 1.1;
    }
    .header-subtitle {
      max-width: 42rem;
      font-size: clamp(.9375rem, 2vw, 1.125rem);
      color: var(--white-70);
    }

    /* Grid layout */
    .main-grid {
      display: grid;
      gap: 1.5rem;
    }
    @media (min-width: 1024px) {
      .main-grid { grid-template-columns: minmax(0,1.3fr) minmax(0,.7fr); }
    }

    /* Card internals */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      border-radius: 1.5rem;
      padding: 1.5rem;
    }
    @media (min-width: 640px) { .card-body { padding: 2rem; } }

    .label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--white-60);
    }

    /* Progress bar */
    .progress-wrap {
      height: .5rem;
      width: 100%;
      overflow: hidden;
      border-radius: 9999px;
      background: var(--white-10);
    }
    .progress-bar {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(to right, var(--violet-400), var(--violet-500), var(--blush-500));
      transition: width .3s;
      width: 0%;
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .875rem;
      color: var(--white-70);
    }
    .status-label { color: var(--white-70); }
    .status-detail { color: var(--white-60); }

    /* Transcript / result */
    .transcript-area {
      width: 100%;
      min-height: 180px;
      border-radius: 1rem;
      border: 1px solid var(--white-10);
      background: rgba(22,11,43,.8);
      padding: .75rem 1rem;
      font-size: 1rem;
      color: var(--white-90);
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
    }
    .transcript-area:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--violet-300);
    }
    .transcript-area::placeholder { color: var(--white-40); }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--white-15);
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      color: var(--white-60);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--violet-400);
      background: rgba(124,58,237,.05);
      color: var(--white-80);
    }
    .drop-zone-icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }

    /* Mic button */
    .mic-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 9999px;
      background: var(--violet-500);
      color: white;
      cursor: pointer;
      border: none;
      font-size: 1.5rem;
      transition: background .15s, transform .1s;
    }
    .mic-btn:hover:not(:disabled) { background: var(--violet-400); }
    .mic-btn.recording {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .mic-btn:disabled { cursor: not-allowed; opacity: .5; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
      50%       { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; display: inline-block; }

    /* File info */
    .file-info {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: .75rem;
      border: 1px solid var(--white-10);
      background: var(--white-5);
      font-size: .875rem;
      color: var(--white-80);
    }

    /* Render state badge */
    .render-badge {
      border-radius: 9999px;
      border: 1px solid var(--white-10);
      background: var(--white-5);
      padding: .25rem .75rem;
      font-size: .75rem;
      color: var(--white-60);
    }
    .render-badge.ready {
      border-color: rgba(196,181,253,.4);
      background: rgba(124,58,237,.2);
      color: var(--violet-200);
    }
    .render-badge.error {
      border-color: rgba(248,113,113,.4);
      background: rgba(239,68,68,.2);
      color: #fca5a5;
    }

    /* Audio player */
    audio {
      width: 100%;
      border-radius: .5rem;
    }
    audio::-webkit-media-controls-panel {
      background: var(--ink-800);
    }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: .5rem; }
    .gap-3 { gap: .75rem; }
    .gap-4 { gap: 1rem; }
    .gap-6 { gap: 1.5rem; }
    .gap-8 { gap: 2rem; }
    .w-full { width: 100%; }
    .hidden { display: none !important; }
    .text-sm { font-size: .875rem; }
    .text-xs { font-size: .75rem; }
    .font-semibold { font-weight: 600; }
    .text-white80 { color: var(--white-80); }
    .text-white60 { color: var(--white-60); }
    .mt-auto { margin-top: auto; }

    /* Model file list */
    .file-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .file-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .5rem .75rem;
      border-radius: .5rem;
      background: var(--white-5);
      font-size: .8125rem;
      color: var(--white-70);
    }
    .file-list .size {
      color: var(--white-40);
      font-size: .75rem;
    }
    .file-list .check { color: #4ade80; }
    .file-list .pending { color: var(--white-40); }

    /* Links in text */
    .link {
      color: var(--white-80);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      transition: color .15s;
    }
    .link:hover {
      color: var(--violet-200);
      text-decoration: underline;
    }

    /* Info banner */
    .info-banner {
      padding: .75rem 1rem;
      border-radius: .75rem;
      border: 1px solid rgba(99,102,241,.3);
      background: rgba(99,102,241,.08);
      font-size: .8125rem;
      color: var(--violet-300);
      line-height: 1.5;
    }

    .warn-banner {
      padding: .75rem 1rem;
      border-radius: .75rem;
      border: 1px solid rgba(234,179,8,.3);
      background: rgba(234,179,8,.08);
      font-size: .8125rem;
      color: #fde047;
      line-height: 1.5;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    /* Responsive tweaks */
    @media (max-width: 640px) {
      .lang-toggle { padding: .125rem; font-size: .625rem; letter-spacing: .15em; }
      .lang-option { padding: .25rem .5rem; }
    }

    /* Section divider text */
    .or-divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      color: var(--white-40);
      font-size: .8125rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--white-10);
    }

    #hidden-file-input { display: none; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div class="hero-glow"></div>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="tag">
          <span class="tag-dot"></span>
          <span data-i18n="headerTag"></span>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <img
            class="avatar"
            src="https://avatars.githubusercontent.com/u/1218286?v=4"
            alt="xezpeleta"
            loading="lazy"
          />
          <a
            class="header-link"
            href="https://github.com/xezpeleta"
            target="_blank"
            rel="noreferrer"
          >GitHub</a>
          <a
            class="header-link"
            href="https://huggingface.co/xezpeleta"
            target="_blank"
            rel="noreferrer"
          >Hugging Face</a>
          <div class="lang-toggle" role="group" aria-label="Language">
            <button class="lang-option" type="button" data-lang="eu">EU</button>
            <button class="lang-option" type="button" data-lang="es">ES</button>
            <button class="lang-option" type="button" data-lang="en">EN</button>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-4">
        <h1 class="header-title" data-i18n="title"></h1>
        <p class="header-subtitle" data-i18n="subtitle"></p>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <span class="badge-violet" data-i18n="modelBadge"></span>
        <span class="badge-neutral" data-i18n="langBadge"></span>
        <div class="flex flex-wrap items-center gap-4 text-sm text-white60">
          <span data-i18n="references"></span>
          <a class="link" href="https://github.com/k2-fsa/sherpa-onnx" target="_blank" rel="noreferrer" data-i18n="refSherpa"></a>
          <a class="link" href="https://huggingface.co/xezpeleta/parakeet-tdt-0.6b-v3-basque-sherpa-onnx" target="_blank" rel="noreferrer" data-i18n="refModel"></a>
          <a class="link" href="https://huggingface.co/datasets/asierhv/composite_corpus_eu_v2.1" target="_blank" rel="noreferrer" data-i18n="refDataset"></a>
        </div>
      </div>
    </header>

    <!-- Main grid -->
    <section class="main-grid">

      <!-- Left column: transcription UI -->
      <div class="glass-card card-body flex flex-col gap-6">

        <!-- Info / warning -->
        <div id="noWasmBanner" class="warn-banner hidden">
          ⚠️ <span data-i18n="noWasm"></span>
        </div>
        <div id="infoBanner" class="info-banner">
          🧪 <span data-i18n="infoBanner"></span>
        </div>

        <!-- Audio input section -->
        <div class="flex flex-col gap-3">
          <div class="label" data-i18n="audioInputLabel"></div>

          <!-- Drop zone for file upload -->
          <div
            id="dropZone"
            class="drop-zone"
            tabindex="0"
            role="button"
            aria-label="Upload audio file"
          >
            <div class="drop-zone-icon">🎵</div>
            <div data-i18n="dropZoneText"></div>
            <div style="font-size:.75rem; margin-top:.25rem; color: var(--white-40)" data-i18n="dropZoneHint"></div>
          </div>
          <input id="hidden-file-input" type="file" accept="audio/*" />

          <!-- Selected file info -->
          <div id="fileInfo" class="file-info hidden">
            <span>🎶</span>
            <span id="fileName" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
            <span id="fileSize" style="color:var(--white-40); font-size:.75rem; white-space:nowrap;"></span>
            <button
              id="clearFileBtn"
              onclick="clearFile()"
              style="background:none;border:none;cursor:pointer;color:var(--white-40);font-size:1rem;padding:.125rem .25rem;transition:color .15s;"
              onmouseover="this.style.color='#fca5a5'"
              onmouseout="this.style.color='var(--white-40)'"
            >✕</button>
          </div>

          <div class="or-divider" data-i18n="orDivider"></div>

          <!-- Microphone input -->
          <div class="input-row">
            <button
              id="micBtn"
              class="mic-btn"
              title="Record"
              disabled
              onclick="toggleRecording()"
            >🎙️</button>
            <div class="flex flex-col gap-1" style="flex:1">
              <div class="text-sm font-semibold text-white80" data-i18n="micLabel"></div>
              <div id="micStatus" class="text-xs text-white60" data-i18n="micIdle"></div>
            </div>
            <audio id="micPlayer" controls class="hidden" style="flex:2; min-width:0;"></audio>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="flex flex-wrap items-center gap-3">
          <button
            id="transcribeBtn"
            class="btn-primary"
            onclick="transcribe()"
            disabled
          >
            <span id="transcribeIcon">📝</span>
            <span id="transcribeLabel" data-i18n="transcribeBtn"></span>
          </button>
          <button
            class="btn-secondary"
            onclick="clearTranscript()"
          >
            <span data-i18n="clearBtn"></span>
          </button>
        </div>

        <!-- Status row -->
        <div class="flex flex-col gap-3">
          <div class="status-row">
            <span id="statusLabel" class="status-label" data-i18n="statusIdle"></span>
            <span id="statusDetail" class="status-detail" data-i18n="statusReady"></span>
          </div>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <!-- Transcript area -->
        <div class="flex flex-col gap-2">
          <div class="label" data-i18n="transcriptLabel"></div>
          <textarea
            id="transcriptArea"
            class="transcript-area"
            readonly
            placeholder="..."
          ></textarea>
          <div class="flex flex-wrap items-center justify-between gap-2">
            <span id="renderState" class="render-badge" data-i18n="renderNone"></span>
            <button
              id="copyBtn"
              class="btn-secondary"
              onclick="copyTranscript()"
              disabled
              style="font-size:.8125rem; padding:.375rem .875rem;"
            >
              <span data-i18n="copyBtn"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Right column: model management -->
      <div class="flex flex-col gap-6">

        <!-- Model download card -->
        <div class="glass-card card-body flex flex-col gap-4">
          <div class="flex items-center justify-between">
            <div class="text-sm font-semibold text-white80" data-i18n="modelCardTitle"></div>
            <span id="modelStatus" class="render-badge" data-i18n="modelNotLoaded"></span>
          </div>

          <div class="info-banner" style="font-size:.75rem;">
            <span data-i18n="modelSizeInfo"></span>
          </div>

          <ul class="file-list" id="fileList">
            <li>
              <span>encoder.int8.onnx</span>
              <span class="flex items-center gap-2">
                <span class="size">652 MB</span>
                <span id="file0" class="pending">○</span>
              </span>
            </li>

const SUPPORTED_LANGS = ['eu', 'es', 'en'];
const STORAGE_LANG_KEY = 'parakeet_basque_asr_language';
let currentLang = 'eu';

function detectLanguage() {
  try {
    const stored = localStorage.getItem(STORAGE_LANG_KEY);
    if (stored && SUPPORTED_LANGS.includes(stored)) return stored;
  } catch {}
  const browserLangs = (navigator.languages || [navigator.language]);
  for (const lang of browserLangs) {
    const lc = lang.toLowerCase();
    for (const sl of SUPPORTED_LANGS) {
      if (lc === sl || lc.startsWith(sl + '-')) return sl;
    }
  }
  return 'eu';
}

function applyTranslations() {
  const t = translations[currentLang];
  document.documentElement.lang = currentLang;
  document.title = t.title + ' – Parakeet ASR';
  document.querySelectorAll('[data-i18n]').forEach((el) => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
}

function setLanguage(lang, persist = true) {
  currentLang = lang;
  if (persist) {
    try { localStorage.setItem(STORAGE_LANG_KEY, lang); } catch {}
  }
  document.querySelectorAll('.lang-option').forEach((btn) => {
    const isActive = btn.dataset.lang === lang;
    btn.classList.toggle('is-active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  applyTranslations();
}

document.querySelectorAll('.lang-option').forEach((btn) => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    if (lang && lang !== currentLang) setLanguage(lang);
  });
});

// =========================================================
// Service worker registration (for COOP/COEP headers)
// =========================================================
async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
    // If a new SW activated, reload to apply headers
    if (reg.active && !navigator.serviceWorker.controller) {
      window.location.reload();
    }
  } catch (err) {
    console.warn('SW registration failed:', err);
  }
}

// =========================================================
// WASM loading – skip the bundled .data file
// =========================================================
// Emscripten uses XMLHttpRequest (not fetch) to download the .data file.
// The official way to skip it is to set Module.getPreloadedPackage which
// Emscripten checks before making the XHR. Returning an empty ArrayBuffer
// causes Emscripten to write 0-byte stubs for the English model files –
// that is fine because our Basque model files use different paths.
function setupGetPreloadedPackage() {
  // This must be set BEFORE window.Module is defined (called first in init)
  // so we store it – then loadWasm() adds it to the Module config.
  window._emscriptenPreloadedPackage = () => {
    console.log('[ASR] getPreloadedPackage called → returning empty buffer (skip English model)');
    return new ArrayBuffer(0);
  };
}

function loadWasm() {
  return new Promise((resolve, reject) => {
    // Configure Module BEFORE the script loads
    window.Module = {
      locateFile: (path) => {
        return HF_WASM_BASE + '/' + path;
      },
      // Return an empty ArrayBuffer so Emscripten skips the XHR for the
      // bundled 191 MB English model .data file (we provide our own model).
      getPreloadedPackage: window._emscriptenPreloadedPackage,
      setStatus: (status) => {
        console.log('[WASM]', status);
      },
      onRuntimeInitialized: () => {
        console.log('[WASM] Runtime initialized');
        wasmReady = true;
        resolve();
      },
      // Suppress errors from the empty .data package
      printErr: (msg) => {
        if (msg.includes('abort') || msg.includes('.data') || msg.includes('Assertion')) {
          console.warn('[WASM]', msg);
        } else {
          console.error('[WASM]', msg);
        }
      },
    };

    // Load high-level API then WASM engine
    const apiScript = document.createElement('script');
    apiScript.src = HF_WASM_BASE + '/sherpa-onnx-asr.js';
    apiScript.onerror = () => reject(new Error('Failed to load sherpa-onnx-asr.js'));
    apiScript.onload = () => {
      const wasmScript = document.createElement('script');
      wasmScript.src = HF_WASM_BASE + '/sherpa-onnx-wasm-main-asr.js';
      wasmScript.onerror = () => reject(new Error('Failed to load wasm-main-asr.js'));
      document.head.appendChild(wasmScript);
    };
    document.head.appendChild(apiScript);
  });
}

// =========================================================
// Model download
// =========================================================
async function downloadFileWithProgress(url, fileIndex) {
  const resp = await fetch(url, { mode: 'cors' });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${url}`);

  const total = parseInt(resp.headers.get('Content-Length') || '0', 10);
  const reader = resp.body.getReader();
  const chunks = [];
  let loaded = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    loaded += value.length;
    if (total > 0) {
      const filePct = Math.round(loaded / total * 100);
      document.getElementById('downloadFileStatus').textContent =
        MODEL_FILES[fileIndex].name + ' – ' + filePct + '%';
    }
  }

  const buf = new Uint8Array(loaded);
  let offset = 0;
  for (const chunk of chunks) {
    buf.set(chunk, offset);
    offset += chunk.length;
  }
  return buf;
}

// =========================================================
// OPFS (Origin Private File System) model caching
// =========================================================
const OPFS_DIR = 'parakeet-basque-asr';

async function opfsGetDir() {
  const root = await navigator.storage.getDirectory();
  return root.getDirectoryHandle(OPFS_DIR, { create: true });
}

async function opfsRead(filename) {
  try {
    const dir  = await opfsGetDir();
    const fh   = await dir.getFileHandle(filename);
    const file = await fh.getFile();
    const buf  = await file.arrayBuffer();
    return new Uint8Array(buf);
  } catch {
    return null; // file not cached
  }
}

async function opfsWrite(filename, data) {
  const dir      = await opfsGetDir();
  const fh       = await dir.getFileHandle(filename, { create: true });
  const writable = await fh.createWritable();
  await writable.write(data);
  await writable.close();
}

async function opfsHasAllFiles() {
  for (const mf of MODEL_FILES) {
    const data = await opfsRead(mf.name);
    if (!data) return false;
  }
  return true;
}

async function clearCache() {
  if (!confirm('Clear cached model files?')) return;
  try {
    const root = await navigator.storage.getDirectory();
    await root.removeEntry(OPFS_DIR, { recursive: true });
    for (let i = 0; i < MODEL_FILES.length; i++) {
      document.getElementById('file' + i).textContent = '○';
      document.getElementById('file' + i).className = 'pending';
    }
    document.getElementById('clearCacheBtn').classList.add('hidden');
    document.getElementById('downloadBtn').classList.remove('hidden');
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('downloadLabel').textContent = translations[currentLang].downloadBtn;
    console.log('[Cache] Cleared');
  } catch (err) {
    console.error('[Cache] Clear error:', err);
  }
}

async function checkCache() {
  if (!('storage' in navigator && 'getDirectory' in navigator.storage)) return false;
  return opfsHasAllFiles();
}

async function downloadModel() {
  if (modelReady) return;

  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  document.getElementById('downloadIcon').textContent = '⏳';
  setModelStatus('loading');
  setStatus('statusDownloading', 'statusDownloadingDetail', 0);

  try {
    const mod = window.Module;
    const fs = mod.FS;
    const useOpfs = 'storage' in navigator && 'getDirectory' in navigator.storage;
    let totalLoaded = 0;
    const totalSize = MODEL_FILES.reduce((s, f) => s + f.size, 0);

    for (let i = 0; i < MODEL_FILES.length; i++) {
      const mf = MODEL_FILES[i];
      const fileEl = document.getElementById('file' + i);
      fileEl.textContent = '⏳';

      let data = null;

      // Try OPFS cache first
      if (useOpfs) {
        data = await opfsRead(mf.name);
        if (data) {
          console.log('[Model] Cache hit:', mf.name, '(' + data.length + ' bytes)');
          document.getElementById('downloadFileStatus').textContent =
            '📦 ' + mf.name + ' (cache)';
        }
      }

      // Download if not cached
      if (!data) {
        const url = HF_MODEL_BASE + '/' + mf.name;
        console.log('[Model] Downloading', mf.name);
        data = await downloadFileWithProgress(url, i);

        // Save to OPFS cache
        if (useOpfs) {
          try {
            await opfsWrite(mf.name, data);
            console.log('[Model] Saved to OPFS cache:', mf.name);
          } catch (cacheErr) {
            console.warn('[Cache] Write failed:', cacheErr);
          }
        }
      }

      // Write to WASM FS (Module.FS is Emscripten's virtual filesystem)
      fs.writeFile(mf.wasmPath, data);
      console.log('[Model] Written to WASM FS:', mf.wasmPath);

      fileEl.textContent = '✓';
      fileEl.className = 'check';
      totalLoaded += mf.size;
      setProgress(Math.round(totalLoaded / totalSize * 70) + 10);
    }

    // Create recognizer
    document.getElementById('downloadFileStatus').textContent = '';
    setProgress(85);
    setStatus('statusLoading', 'statusDownloadingDetail', 85);

    recognizer = new OfflineRecognizer({
      modelConfig: {
        transducer: {
          encoder: '/encoder.int8.onnx',
          decoder: '/decoder.int8.onnx',
          joiner:  '/joiner.int8.onnx',
        },
        tokens:      '/tokens.txt',
        numThreads:  2,
        provider:    'cpu',
        debug:       0,
        modelType:   '',
      },
      decodingMethod: 'greedy_search',
    }, window.Module);

    modelReady = true;
    setProgress(100);
    setStatus('statusIdle', 'statusReady', 100);
    setModelStatus('ready');
    document.getElementById('downloadBtn').classList.add('hidden');
    document.getElementById('clearCacheBtn').classList.remove('hidden');
    document.getElementById('transcribeBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
    console.log('[Model] Recognizer created successfully');

  } catch (err) {
    console.error('[Model] Download/init error:', err);
    setStatus('statusError', err.message, 0);
    setModelStatus('idle');
    btn.disabled = false;
    document.getElementById('downloadIcon').textContent = '⬇️';
  }
}

function humanSize(bytes) {
  if (bytes < 1024)         return bytes + ' B';
  if (bytes < 1024 * 1024)  return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

  document.getElementById('fileSize').textContent = humanSize(file.size);
  if (modelReady) {
    document.getElementById('transcribeBtn').disabled = false;
  }
}

  audioBlob = null;
  document.getElementById('fileInfo').classList.add('hidden');

}

  if (e.key === 'Enter' || e.key === ' ') document.getElementById('hidden-file-input').click();
});
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setAudioFile(file);
});

document.getElementById('hidden-file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) setAudioFile(file);
});

// =========================================================
// Microphone recording
// =========================================================
async function toggleRecording() {
  if (!isRecording) {
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    alert('Microphone access denied: ' + err.message);
    return;
  }

  micChunks = [];
  mediaRecorder = new MediaRecorder(micStream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) micChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start();

  isRecording = true;
  const btn = document.getElementById('micBtn');
  btn.textContent = '⏹';
  btn.classList.add('recording');
  document.getElementById('micStatus').textContent = translations[currentLang].micRecording;
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (micStream) {
    micStream.getTracks().forEach((t) => t.stop());
    micStream = null;
  }
  isRecording = false;
  const btn = document.getElementById('micBtn');
  btn.textContent = '🎙️';
  btn.classList.remove('recording');
}

function onRecordingStop() {
  const blob = new Blob(micChunks, { type: 'audio/webm' });
  const url  = URL.createObjectURL(blob);
  const player = document.getElementById('micPlayer');
  player.src = url;
  player.classList.remove('hidden');
  document.getElementById('micStatus').textContent = translations[currentLang].micDone;

  // Use this as the audio source
  blob.name = 'recording.webm';
  setAudioFile(blob);
}

// =========================================================
// Transcription
// =========================================================
async function transcribe() {
  if (!recognizer || !audioBlob) return;

  const btn = document.getElementById('transcribeBtn');
  btn.disabled = true;
  document.getElementById('transcribeIcon').textContent = '⏳';
  setStatus('statusTranscribing', 'statusTranscribing', 0);
  setRenderState('idle');
  document.getElementById('transcriptArea').value = '';
  document.getElementById('copyBtn').disabled = true;

  try {
    // Decode audio using browser's AudioContext
    setProgress(10);
    const arrayBuffer = await audioBlob.arrayBuffer();
    const audioCtx    = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const decoded     = await audioCtx.decodeAudioData(arrayBuffer);
    await audioCtx.close();

    const targetSR   = 16000;
    let samples;
    if (decoded.sampleRate !== targetSR) {
      // Resample
      const offCtx   = new OfflineAudioContext(1, Math.round(decoded.duration * targetSR), targetSR);
      const src       = offCtx.createBufferSource();
      src.buffer      = decoded;
      src.connect(offCtx.destination);
      src.start();
      const resampled = await offCtx.startRendering();
      samples         = resampled.getChannelData(0);
    } else {
      samples = decoded.getChannelData(0);
    }

    setProgress(30);

    // Chunk audio into segments of max 30 seconds for memory efficiency
    const CHUNK_SECS   = 30;
    const chunkSize    = CHUNK_SECS * targetSR;
    const totalChunks  = Math.ceil(samples.length / chunkSize);
    const results      = [];

    for (let ci = 0; ci < totalChunks; ci++) {
      const start  = ci * chunkSize;
      const end    = Math.min(start + chunkSize, samples.length);
      const chunk  = samples.slice(start, end);

      const stream = recognizer.createStream();
      stream.acceptWaveform(targetSR, chunk);
      recognizer.decode(stream);
      const result = recognizer.getResult(stream);
      results.push(result.text || result.tokens || '');
      stream.free();

      setProgress(30 + Math.round((ci + 1) / totalChunks * 65));
    }

    const transcript = results.join(' ').trim();
    document.getElementById('transcriptArea').value = transcript || '(no text recognized)';
    document.getElementById('copyBtn').disabled = false;
    setProgress(100);
    setStatus('statusIdle', 'statusReady', 100);
    setRenderState('ready');

  } catch (err) {
    console.error('[Transcribe]', err);
    document.getElementById('transcriptArea').value = 'Error: ' + err.message;
    setStatus('statusError', err.message, 0);
    setRenderState('error');
  } finally {
    btn.disabled = false;
    document.getElementById('transcribeIcon').textContent = '📝';
  }
}

function clearTranscript() {
  document.getElementById('transcriptArea').value = '';
  document.getElementById('copyBtn').disabled = true;
  setRenderState('idle');
}

async function copyTranscript() {
  const text = document.getElementById('transcriptArea').value;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = translations[currentLang].copyBtn; }, 1200);
  } catch {}
}

// =========================================================
// Init
// =========================================================
async function init() {
  // Check WebAssembly support
  if (typeof WebAssembly === 'undefined') {
    document.getElementById('noWasmBanner').classList.remove('hidden');
    return;
  }

  // Register service worker
  await registerServiceWorker();

  // Pre-configure the Emscripten getPreloadedPackage hook so loadWasm() can
  // attach it to Module before the WASM script loads.
  setupGetPreloadedPackage();

  setStatus('statusLoading', 'statusDownloadingDetail', 5);

  try {
    await loadWasm();

    // Check OPFS cache and update button label
    const cached = await checkCache();
    const downloadLabel = document.getElementById('downloadLabel');
    if (cached) {
      downloadLabel.textContent = translations[currentLang].downloadBtnCached;
      // Show cache clear button even before loading
      document.getElementById('clearCacheBtn').classList.remove('hidden');
    }

    setStatus('statusIdle', 'statusReady', 10);
    document.getElementById('downloadBtn').disabled = false;
    console.log('[Init] WASM ready, model download available, cache:', cached);
  } catch (err) {
    console.error('[Init] WASM load error:', err);
    setStatus('statusError', err.message, 0);
  }
}

// Set language before DOMContentLoaded content is rendered
currentLang = detectLanguage();
setLanguage(currentLang, false);

// Start app
init();
</script>
